# Shop Integration Settings
shop-integration:
  # Enable integration with EcoShop to allow purchasing missing materials
  enabled: true
  # Show shop prices in the QuickCraft lore for missing materials
  show-prices: true

default-category: "main"
craft-gui:
  title: "&8Crafting Recipe"
  mask:
    items:
      - black_stained_glass_pane
    pattern:
      - "111111111"
      - "1iii11111"
      - "1iii11o11"
      - "1iii11111"
      - "111010111"
  buttons:
    recipe-parts-lore:
      - ""
      - "&bLeft Click&f to see the recipe"
      - ""
    back:
      row: 5
      column: 5
      item: barrier name:"&cBack"
      lore: []
      click_sound: ui.button_click
    quick-craft:
      row: 5
      column: 3
      item: crafting_table name:"&aQuick Craft"
      lore:
        - ""
        - "&7Materials:"
        - "%materials%"
        - ""
        - "&bLeft Click&f to craft"
        - ""
      success_sound: entity.player.levelup
      fail_sound: entity.villager.no
  custom-slots: []